# Automatically build the project and run any configured tests for every push
# and submitted pull request. This can help catch issues that only occur on
# certain platforms or Java versions, and provides a first line of defence
# against bad commits.

name: build
on:
  pull_request:
  workflow_dispatch:
  push:
    paths-ignore:
      - '**.md'
      - '.devcon*'
      - 'devcon*.json'
      - '.gitpod*'
      - 'Dockerfile'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        java: [ 21 ]
        os: [ ubuntu-22.04 ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for changelog generation

      - name: Validate gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build mod
        id: build_bin
        run: bash build.sh ${{ github.ref }}

      - name: Capture build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bettertpa4fabric-build
          path: build/libs/

      # --- Release-only steps below ---
      # binver is set only on tagged releases (e.g. "0.0.1"), never on debug builds

      - name: Check for previous release tag
        id: prev_tag
        if: ${{ steps.build_bin.outputs.binver != '' }}
        run: |
          PREV=$(git tag --sort=-creatordate | grep -E '^v' | sed -n '2p')
          if [[ -n "$PREV" ]]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No previous release tag found — skipping changelog for first release."
          fi

      - name: Update CHANGELOG.md
        id: changelog
        if: ${{ steps.build_bin.outputs.binver != '' && steps.prev_tag.outputs.exists == 'true' }}
        uses: requarks/changelog-action@v1
        with:
          token: ${{ secrets.GH_TOKEN }}
          tag: ${{ github.ref_name }}
          restrictToTypes: 'feat,fix,misc,chore,refactor'
          useGitmojis: false
          reverseOrder: true

      - name: Commit CHANGELOG.md
        if: ${{ steps.build_bin.outputs.binver != '' && steps.prev_tag.outputs.exists == 'true' }}
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: master
          commit_message: 'Release: Update CHANGELOG.md for ${{ steps.build_bin.outputs.binver }} [skip ci]'
          file_pattern: CHANGELOG.md

      - name: Upload to Modrinth and GitHub
        if: ${{ steps.build_bin.outputs.binver != '' }}
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          github-token: ${{ secrets.GH_TOKEN }}

          name: BetterTPA4Fabric ${{ steps.build_bin.outputs.binver }}
          files: build/libs/bettertpa4fabric-${{ steps.build_bin.outputs.binver }}.jar
          version-type: release
          github-generate-changelog: false
          github-draft: false
          github-prerelease: false
          changelog-file: CHANGELOG.md
          
