name: test
on:
  pull_request:
    branches:
      - feat/test
  push:
    branches:
      - feat/test
    paths-ignore:
      - '**.md'
      - '.devcon*'
      - 'devcon*.json'
      - '.gitpod*'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        java: [ 21 ]
        os: [ ubuntu-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate gradle wrapper
        uses: gradle/wrapper-validation-action@v1

      - name: Setup JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'gradle'

      - name: Make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Download Minecraft assets
        run: ./gradlew downloadAssets

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/
            **/build/test-results/
